<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BusSchool - Monitoramento Escolar</title>
    
    <link rel="stylesheet" href="style.css">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container">
        <div class="header">
            <i class="fas fa-bus-alt"></i>
            <h1>BusSchool</h1>
            <p>Acompanhe sua rota em tempo real</p>
        </div>

        <div class="content">
            <label>SELECIONE SUA ROTA</label>
            <!-- Alterado: chama updateButtonTime ao mudar -->
            <select id="route" onchange="updateButtonTime()">
                <option value="">Aguardando seleção...</option>
                <option value="10">Rota 01 - Centro (10 min)</option>
                <option value="15">Rota 02 - São José Operário (15 min)</option>
                <option value="10">Rota 03 - São Pedro (20 min)</option>
                <option value="15">Rota 04 - Linha Cambuí (25 min)</option>
                <option value="10">Rota 05 - Porto Moisés Lupion (30 min)</option>
                <option value="12">Rota 06 - São Luiz (12 min)</option>
            </select>

            <button class="btn-play" onclick="startBusJourney()" style="width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 12px; border: none; background: #6c5ce7; color: white; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;">
                <i class="fas fa-play"></i>
                <span id="btn-text">INICIAR VIAGEM (0 MIN)</span>
            </button>

            <div class="map-container" id="mapWrapper">
                <svg viewBox="0 0 400 200" class="map-svg">
                    <path id="route-path-animation" d="M 50 150 Q 150 50 250 150 T 350 50" fill="none" stroke="#dfe6e9" stroke-width="4" stroke-dasharray="8""")/>>
                    
                    <circle cx="50" cy="150" r="6" class="stop-point" />
                    <circle cx="165" cy="85" r="6" class="stop-point" />
                    <circle cx="280" cy="125" r="6" class="stop-point" />
                    <circle cx="350" cy="50" r="8" class="stop-point school" />

                    <g id="bus-marker-dynamic">
                        <text y="10" x="-12" font-size="24">🚌</text>
                    </g>
                </svg>
                <div class="map-labels">
                    <span>Bairro</span>
                    <span>Escola</span>
                </div>
            </div>

            <div id="bus-card" class="bus-card" style="display: none;">
                <div class="route-info">
                    <div class="eta-circle">
                        <div id="minutes">0</div>
                        <span>min</span>
                    </div>
                    <div>
                        <h3 id="status-text">Ônibus em movimento...</h3>
                        <p class="sub-text" id="arrival-text">Chegada prevista em 0 minutos</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let countdown; // Variável global para controlar o tempo

        // Atualiza o texto do botão quando seleciona a rota
        function updateButtonTime() {
            const routeSelect = document.getElementById('route');
            const btnText = document.getElementById('btn-text');
            const tempo = routeSelect.value;

            if (tempo) {
                btnText.innerText = `INICIAR VIAGEM (${tempo} MIN)`;
            } else {
                btnText.innerText = "INICIAR VIAGEM (0 MIN)";
            }
        }

        function startBusJourney() {
            const routeSelect = document.getElementById('route');
            const tempoSelecionado = parseInt(routeSelect.value);

            // Valida se foi selecionada uma rota
            if (!tempoSelecionado) {
                alert("Selecione uma rota antes de iniciar!");
                return;
            }

            // Limpa intervalos anteriores
            clearInterval(countdown);

            const mapWrapper = document.getElementById('mapWrapper');
            const busCard = document.getElementById('bus-card');
            const minutesDisplay = document.getElementById('minutes');
            const statusText = document.getElementById('status-text');
            const arrivalText = document.getElementById('arrival-text');

            // Reinicia animação
            mapWrapper.classList.remove('animating');
            void mapWrapper.offsetWidth; 
            mapWrapper.classList.add('animating');
            
            busCard.style.display = 'block';
            
            let timeLeft = tempoSelecionado;
            minutesDisplay.innerText = timeLeft;
            statusText.innerText = "Ônibus em movimento...";
            arrivalText.innerText = `Chegada prevista em ${timeLeft} minutos`;

            // Inicia contagem regressiva (1 minuto = 60000ms)
            countdown = setInterval(() => {
                timeLeft--;
                if (timeLeft > 0) {
                    minutesDisplay.innerText = timeLeft;
                    arrivalText.innerText = `Chegada prevista em ${timeLeft} minutos`;
                } else {
                    minutesDisplay.innerText = "0";
                    statusText.innerText = "Chegou ao destino!";
                    arrivalText.innerText = "O ônibus está na escola.";
                    clearInterval(countdown);
                }
            }, 60000); 
        }
    </script>
</body>
</html>
