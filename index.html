<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colégio Modelo - BusSchool</title>
    
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <style>
        .escola-container {
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            font-family: 'Poppins', sans-serif;
        }
        .foto-escola {
            width: 100%;
            height: 300px;
            object-fit: cover;
            border-radius: 15px;
            margin-bottom: 20px;
        }
        .btn-rastreio {
            background: #6c5ce7;
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-weight: bold;
            margin: 20px 0;
            cursor: pointer;
            transition: transform 0.2s;
            border: none;
        }
        .btn-rastreio:hover { transform: scale(1.05); }
        .mapa-escola {
            width: 100%;
            height: 350px;
            border-radius: 15px;
            border: none;
            margin-top: 20px;
        }
        #secao-busschool { display: none; }
    </style>
</head>
<body>

    <!-- SEÇÃO 1: APRESENTAÇÃO DA ESCOLA -->
    <div id="secao-apresentacao" class="escola-container">
        <!-- Nome do arquivo corrigido para colegio.jpeg -->
        <img src="coelgio.jpeg" alt="Foto do Colégio" class="foto-escola">
        
        <h1>Bem-vindo ao Colégio Modelo</h1>
        <p>Excelência no ensino e segurança no transporte para nossos alunos.</p>

        <button class="btn-rastreio" onclick="abrirRastreador()">
            <i class="fas fa-bus"></i> RASTREAR MEU ÔNIBUS
        </button>

        <hr style="margin: 30px 0; border: 0; border-top: 1px solid #eee;">

        <h3>Nossa Localização</h3>
        <p><i class="fas fa-map-marker-alt"></i> Av. Sete de Setembro, 444 - São Cristóvão, Capanema - PR</p>
        
        <!-- Mapa ajustado com suas coordenadas exatas -->
        <iframe class="mapa-escola" 
            src="https://google.com" 
            allowfullscreen="" loading="lazy">
        </iframe>
    </div>

    <!-- SEÇÃO 2: O SEU CÓDIGO DO BUSSCHOOL -->
    <div id="secao-busschool">
        <div class="container">
            <div class="header" style="display: flex; align-items: center; justify-content: space-between; padding: 20px;">
                <button onclick="voltarParaSite()" style="background: none; border: none; color: white; cursor: pointer; font-size: 1.2rem;">
                    <i class="fas fa-arrow-left"></i> Voltar
                </button>
                <div style="text-align: center; flex-grow: 1;">
                    <i class="fas fa-bus-alt"></i>
                    <h1>BusSchool</h1>
                </div>
            </div>

            <div class="content">
                <label>SELECIONE SUA ROTA</label>
                <select id="route" onchange="updateButtonTime()">
                    <option value="">Aguardando seleção...</option>
                    <option value="10">Rota 01 - Centro (10 min)</option>
                    <option value="15">Rota 02 - São José Operário (15 min)</option>
                    <option value="20">Rota 03 - São Pedro (20 min)</option>
                    <option value="25">Rota 04 - Linha Cambuí (25 min)</option>
                    <option value="30">Rota 05 - Porto Moisés Lupion (30 min)</option>
                    <option value="12">Rota 06 - São Luiz (12 min)</option>
                </select>

                <button class="btn-play" onclick="startBusJourney()" id="btn-main">
                    <i class="fas fa-play"></i>
                    <span id="btn-text">INICIAR VIAGEM (0 MIN)</span>
                </button>

                <div class="map-container" id="mapWrapper">
                    <svg viewBox="0 0 400 200" class="map-svg">
                        <path id="route-path-animation" d="M 50 150 Q 150 50 250 150 T 350 50" fill="none" stroke="#dfe6e9" stroke-width="4" stroke-dasharray="8""")/>>
                        <circle cx="50" cy="150" r="6" class="stop-point" />
                        <circle cx="165" cy="85" r="6" class="stop-point" />
                        <circle cx="280" cy="125" r="6" class="stop-point" />
                        <circle cx="350" cy="50" r="8" class="stop-point school" />
                        <g id="bus-marker-dynamic">
                            <text y="10" x="-12" font-size="24">🚌</text>
                        </g>
                    </svg>
                    <div class="map-labels">
                        <span>Bairro</span>
                        <span>Escola</span>
                    </div>
                </div>

                <div id="bus-card" class="bus-card" style="display: none;">
                    <div class="route-info">
                        <div class="eta-circle">
                            <div id="minutes">0</div>
                            <span>min</span>
                        </div>
                        <div>
                            <h3 id="status-text">Ônibus em movimento...</h3>
                            <p class="sub-text" id="arrival-text">Chegada prevista em 0 minutos</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function abrirRastreador() {
            document.getElementById('secao-apresentacao').style.display = 'none';
            document.getElementById('secao-busschool').style.display = 'block';
            window.scrollTo(0, 0);
        }

        function voltarParaSite() {
            document.getElementById('secao-apresentacao').style.display = 'block';
            document.getElementById('secao-busschool').style.display = 'none';
            if (countdown) clearInterval(countdown);
        }

        let countdown;

        function updateButtonTime() {
            const routeSelect = document.getElementById('route');
            const btnText = document.getElementById('btn-text');
            const tempo = routeSelect.value;
            btnText.innerText = tempo ? `INICIAR VIAGEM (${tempo} MIN)` : "INICIAR VIAGEM (0 MIN)";
        }

        function startBusJourney() {
            const routeSelect = document.getElementById('route');
            const tempoSelecionado = parseInt(routeSelect.value);

            if (!tempoSelecionado) {
                alert("Selecione uma rota antes de iniciar!");
                return;
            }

            if (countdown) clearInterval(countdown);
            
            const mapWrapper = document.getElementById('mapWrapper');
            const busCard = document.getElementById('bus-card');
            const minutesDisplay = document.getElementById('minutes');
            const statusText = document.getElementById('status-text');
            const arrivalText = document.getElementById('arrival-text');

            mapWrapper.classList.remove('animating');
            void mapWrapper.offsetWidth; 
            mapWrapper.classList.add('animating');
            busCard.style.display = 'block';
            
            let timeLeft = tempoSelecionado;
            minutesDisplay.innerText = timeLeft;
            statusText.innerText = "Ônibus em movimento...";
            arrivalText.innerText = `Chegada prevista em ${timeLeft} minutos`;

            countdown = setInterval(() => {
                timeLeft--;
                if (timeLeft > 0) {
                    minutesDisplay.innerText = timeLeft;
                    arrivalText.innerText = `Chegada prevista em ${timeLeft} minutos`;
                } else {
                    minutesDisplay.innerText = "0";
                    statusText.innerText = "Chegou ao destino!";
                    arrivalText.innerText = "O ônibus está na escola.";
                    clearInterval(countdown);
                }
            }, 60000); 
        }
    </script>
</body>
</html>
