<div class="card">
    <h2>🚌 Onde está meu ônibus?</h2>
    
    <select id="route-select" onchange="updateBusStatus()" style="padding: 10px; border-radius: 8px; width: 100%; margin-bottom: 20px;">
        <option value="">Selecione sua rota...</option>
        <option value="1">Rota 01 - Centro / Bairro Novo</option>
        <option value="2">Rota 02 - Vila Industrial</option>
        <option value="3">Rota 03 - Interior / Fazendas</option>
    </select>

    <div id="bus-monitor" style="display: none; background: #f8f9fa; padding: 15px; border-radius: 12px; border-left: 5px solid #6c5ce7;">
        <p id="bus-status">🔄 Localizando ônibus...</p>
        <div style="background: #eee; height: 10px; border-radius: 5px; overflow: hidden; margin: 10px 0;">
            <div id="progress-bar" style="width: 0%; height: 100%; background: #6c5ce7; transition: width 1s;"></div>
        </div>
        <small id="eta-text">Calculando tempo de chegada...</small>
    </div>
</div>

<script>
function updateBusStatus() {
    const route = document.getElementById('route-select').value;
    const monitor = document.getElementById('bus-monitor');
    const status = document.getElementById('bus-status');
    const progress = document.getElementById('progress-bar');
    const eta = document.getElementById('eta-text');

    if (route !== "") {
        monitor.style.display = 'block';
        // Simulação de busca de dados reais
        setTimeout(() => {
            status.innerHTML = "<strong>Ônibus em Movimento</strong> 🚌";
            progress.style.width = "65%";
            eta.innerText = "Previsão de chegada: 8 minutos";
        }, 800);
    } else {
        monitor.style.display = 'none';
    }
}
</script>
