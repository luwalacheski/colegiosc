<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repertório Criativo | Colégio Ágora</title>
    <style>
        :root {
            --cor-repertorio: #6c5ce7;
            --cor-texto: #2d3436;
            --cor-bg: #fdfdfd;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--cor-bg);
            color: var(--cor-texto);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        header {
            background: var(--cor-repertorio);
            color: white;
            padding: 50px 20px;
            text-align: center;
        }

        .container {
            max-width: 1000px;
            margin: -30px auto 50px auto;
            padding: 0 20px;
        }

        .intro {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            text-align: center;
            margin-bottom: 40px;
        }

        .filtro-repertorio {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .tag {
            background: #eee;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
            color: var(--cor-repertorio);
        }

        .grid-repertorio {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }

        .item-repertorio {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid #eee;
            transition: all 0.4s ease;
        }

        .item-repertorio:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(108, 92, 231, 0.15);
        }

        .capa {
            height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
        }

        .conteudo {
            padding: 20px;
        }

        .conteudo h3 {
            margin: 0 0 10px 0;
            color: var(--cor-repertorio);
        }

        .contato-rodape {
            text-align: center;
            margin-top: 60px;
            padding: 40px;
            background: #f1f2f6;
            border-radius: 30px;
        }

        .btn-contato {
            display: inline-block;
            margin-top: 15px;
            color: var(--cor-repertorio);
            text-decoration: none;
            font-weight: bold;
            border-bottom: 2px solid var(--cor-repertorio);
        }

        footer {
            text-align: center;
            padding: 40px;
            color: #b2bec3;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

<header>
    <h1>📚 Nosso Repertório</h1>
    <p>A coleção de ideias e talentos do Colégio Ágora.</p>
</header>

<div class="container">
    <div class="intro">
        <h2>O que nossos alunos estão criando?</h2>
        <p>Explore as produções das nossas turmas de 2026.</p>
        <div class="filtro-repertorio">
            <span class="tag">#Ciencia</span>
            <span class="tag">#ArteDigital</span>
            <span class="tag">#Literatura</span>
