<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BusSchool - Monitoramento Escolar</title>
    
    <link rel="stylesheet" href="style.css">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container">
        <div class="header">
            <i class="fas fa-bus-alt"></i>
            <h1>BusSchool</h1>
            <p>Acompanhe sua rota em tempo real</p>
        </div>

        <div class="content">
            <label>SELECIONE SUA ROTA</label>
            <select id="route">
                <option value="">Aguardando seleção...</option>
                <option value="1">Rota 01 - Centro (Via Parque)</option>
                <option value="2">Rota 02 - Norte (Via Hospital)</option>
            </select>

            <button class="btn-play" id="btnPlay" onclick="toggleTracking()">
                <i class="fas fa-play" id="playIcon"></i>
                <span id="playText">INICIAR MONITORAMENTO</span>
            </button>

            <div class="map-container" id="mapWrapper">
                <svg viewBox="0 0 400 200" class="map-svg">
                    <path id="route-line" d="M 50 150 Q 150 50 250 150 T 350 50" fill="none" stroke="#dfe6e9" stroke-width="4" stroke-dasharray="8"/>
                    
                    <circle cx="50" cy="150" r="6" class="stop-point" />
                    <circle cx="165" cy="85" r="6" class="stop-point" />
                    <circle cx="280" cy="125" r="6" class="stop-point" />
                    <circle cx="350" cy="50" r="8" class="stop-point school" />

                    <g id="bus-unit">
                        <text y="10" x="-12" font-size="24">🚌</text>
                    </g>
                </svg>
                
                <div class="map-labels">
                    <span>Bairro</span>
                    <span>Escola</span>
                </div>
            </div>

            <div id="bus-card" class="bus-card">
                <div class="route-info">
                    <div class="eta-circle">
                        <div id="minutes">--</div>
                        <span>min</span>
                    </div>
                    <div>
                        <h3 id="status-text">Localizando...</h3>
                        <p class="sub-text" id="next-stop">Próxima parada: Calculando...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function toggleTracking() {
            const mapWrapper = document.getElementById('mapWrapper');
            const btnText = document.getElementById('playText');
            const btnIcon = document.getElementById('playIcon');
            const busCard = document.getElementById('bus-card');

            // Ativa/Desativa a classe que dispara a animação no CSS
            mapWrapper.classList.toggle('active-route');

            if (mapWrapper.classList.contains('active-route')) {
                btnText.innerText = "PARAR MONITORAMENTO";
                btnIcon.classList.replace('fa-play', 'fa-stop');
                busCard.style.display = 'block'; // Mostra o card de informações
                document.getElementById('minutes').innerText = "12";
                document.getElementById('status-text').innerText = "Ônibus em Movimento";
            } else {
                btnText.innerText = "INICIAR MONITORAMENTO";
                btnIcon.classList.replace('fa-stop', 'fa-play');
                busCard.style.display = 'none';
            }
        }
    </script>
</body>
</html>
