<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BusSchool - Monitoramento Escolar</title>
    
    <link rel="stylesheet" href="style.css">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container">
        <div class="header">
            <i class="fas fa-bus-alt"></i>
            <h1>BusSchool</h1>
            <p>Acompanhe sua rota em tempo real</p>
        </div>

        <div class="content">
            <label>PARA ONDE VOCÊ VAI?</label>
            <select id="route" onchange="checkBus()">
                <option value="">Selecione sua linha...</option>
                <option value="1">Linha Amarela - Centro</option>
                <option value="2">Linha Verde - Bairro Industrial</option>
                <option value="3">Linha Azul - Residencial Sul</option>
            </select>

            <div id="bus-card" class="bus-card">
                <div class="status-badge status-moving">
                    <i class="fas fa-circle-notch fa-spin"></i> Em movimento
                </div>
                
                <div class="route-info">
                    <div class="eta-circle">
                        <div id="minutes">--</div>
                        <span>min</span>
                    </div>
                    <div>
                        <h3 id="route-name">Rota Selecionada</h3>
                        <p class="sub-text"><i class="fas fa-map-marker-alt"></i> Próxima parada: Escola Central</p>
                    </div>
                </div>

                <div class="progress-container">
                    <div id="progress" class="progress-bar">
                        <i class="fas fa-bus bus-icon-marker"></i>
                    </div>
                </div>
                <div class="labels-row">
                    <span>SAÍDA</span>
                    <span>CHEGADA (ESCOLA)</span>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
